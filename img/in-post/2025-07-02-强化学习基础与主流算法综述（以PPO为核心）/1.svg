<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; }
      .label { font-family: Arial, sans-serif; font-size: 12px; }
      .small-label { font-family: Arial, sans-serif; font-size: 10px; }
      .formula { font-family: 'Times New Roman', serif; font-size: 11px; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666" />
    </marker>
  </defs>

  <!-- 中心节点 -->
  <circle cx="600" cy="400" r="80" fill="#ff6b6b" stroke="#fff" stroke-width="3"/>
  <text x="600" y="395" text-anchor="middle" class="title" fill="white">PPO训练</text>
  <text x="600" y="410" text-anchor="middle" class="title" fill="white">过程</text>

  <!-- 数据收集阶段 -->
  <g>
    <circle cx="300" cy="200" r="60" fill="#4ecdc4" stroke="#fff" stroke-width="2"/>
    <text x="300" y="195" text-anchor="middle" class="label" fill="white">数据收集</text>
    <text x="300" y="210" text-anchor="middle" class="label" fill="white">(Old Policy)</text>
    <line x1="540" y1="350" x2="350" y2="240" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- 子节点 -->
    <rect x="120" y="120" width="80" height="40" rx="5" fill="#a8e6cf" stroke="#4ecdc4"/>
    <text x="160" y="135" text-anchor="middle" class="small-label">状态序列</text>
    <text x="160" y="150" text-anchor="middle" class="small-label">s₁,s₂,...,sₙ</text>
    <line x1="240" y1="180" x2="200" y2="150" stroke="#4ecdc4" stroke-width="1"/>
    
    <rect x="220" y="120" width="80" height="40" rx="5" fill="#a8e6cf" stroke="#4ecdc4"/>
    <text x="260" y="135" text-anchor="middle" class="small-label">动作序列</text>
    <text x="260" y="150" text-anchor="middle" class="small-label">a₁,a₂,...,aₙ</text>
    <line x1="270" y1="180" x2="270" y2="160" stroke="#4ecdc4" stroke-width="1"/>
    
    <rect x="320" y="120" width="80" height="40" rx="5" fill="#a8e6cf" stroke="#4ecdc4"/>
    <text x="360" y="135" text-anchor="middle" class="small-label">奖励序列</text>
    <text x="360" y="150" text-anchor="middle" class="small-label">r₁,r₂,...,rₙ</text>
    <line x1="340" y1="180" x2="380" y2="160" stroke="#4ecdc4" stroke-width="1"/>
  </g>

  <!-- 优势函数计算 -->
  <g>
    <circle cx="900" cy="200" r="60" fill="#ffa726" stroke="#fff" stroke-width="2"/>
    <text x="900" y="195" text-anchor="middle" class="label" fill="white">优势函数</text>
    <text x="900" y="210" text-anchor="middle" class="label" fill="white">计算</text>
    <line x1="660" y1="350" x2="850" y2="240" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- GAE公式 -->
    <rect x="800" y="120" width="200" height="40" rx="5" fill="#ffcc80" stroke="#ffa726"/>
    <text x="900" y="135" text-anchor="middle" class="formula">A^GAE(s,a) = Σ(γλ)ᵗδₜ₊ₗ</text>
    <text x="900" y="150" text-anchor="middle" class="small-label">GAE优势估计</text>
    <line x1="880" y1="180" x2="900" y2="160" stroke="#ffa726" stroke-width="1"/>
    
    <rect x="800" y="70" width="200" height="30" rx="5" fill="#ffcc80" stroke="#ffa726"/>
    <text x="900" y="85" text-anchor="middle" class="formula">Aₜ = rₜ + γV(sₜ₊₁) - V(sₜ)</text>
    <line x1="900" y1="120" x2="900" y2="100" stroke="#ffa726" stroke-width="1"/>
  </g>

  <!-- PPO目标函数 -->
  <g>
    <circle cx="600" cy="600" r="70" fill="#ab47bc" stroke="#fff" stroke-width="2"/>
    <text x="600" y="595" text-anchor="middle" class="label" fill="white">PPO目标</text>
    <text x="600" y="610" text-anchor="middle" class="label" fill="white">函数</text>
    <line x1="600" y1="480" x2="600" y2="530" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- PPO-clip公式 -->
    <rect x="400" y="680" width="400" height="50" rx="5" fill="#ce93d8" stroke="#ab47bc"/>
    <text x="600" y="695" text-anchor="middle" class="formula">L^CLIP = E[min(rₜ(θ)Âₜ, clip(rₜ(θ), 1-ε, 1+ε)Âₜ)]</text>
    <text x="600" y="710" text-anchor="middle" class="small-label">其中 rₜ(θ) = πθ(aₜ|sₜ)/πθ_old(aₜ|sₜ)</text>
    <text x="600" y="725" text-anchor="middle" class="small-label">概率比例裁剪防止策略更新过大</text>
    <line x1="600" y1="670" x2="600" y2="730" stroke="#ab47bc" stroke-width="1"/>
  </g>

  <!-- 策略网络更新 -->
  <g>
    <circle cx="200" cy="500" r="60" fill="#66bb6a" stroke="#fff" stroke-width="2"/>
    <text x="200" y="495" text-anchor="middle" class="label" fill="white">策略网络</text>
    <text x="200" y="510" text-anchor="middle" class="label" fill="white">更新</text>
    <line x1="540" y1="450" x2="250" y2="480" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <rect x="100" y="580" width="200" height="40" rx="5" fill="#a5d6a7" stroke="#66bb6a"/>
    <text x="200" y="595" text-anchor="middle" class="small-label">Actor网络参数更新</text>
    <text x="200" y="610" text-anchor="middle" class="small-label">πθ_new ← πθ_old + ∇L^CLIP</text>
    <line x1="200" y1="560" x2="200" y2="580" stroke="#66bb6a" stroke-width="1"/>
  </g>

  <!-- 价值网络更新 -->
  <g>
    <circle cx="1000" cy="500" r="60" fill="#42a5f5" stroke="#fff" stroke-width="2"/>
    <text x="1000" y="495" text-anchor="middle" class="label" fill="white">价值网络</text>
    <text x="1000" y="510" text-anchor="middle" class="label" fill="white">更新</text>
    <line x1="660" y1="450" x2="950" y2="480" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <rect x="900" y="580" width="200" height="40" rx="5" fill="#90caf9" stroke="#42a5f5"/>
    <text x="1000" y="595" text-anchor="middle" class="small-label">Critic网络参数更新</text>
    <text x="1000" y="610" text-anchor="middle" class="small-label">最小化价值函数误差</text>
    <line x1="1000" y1="560" x2="1000" y2="580" stroke="#42a5f5" stroke-width="1"/>
  </g>

  <!-- 关键特性标注 -->
  <g>
    <rect x="20" y="20" width="200" height="120" rx="10" fill="#f5f5f5" stroke="#ddd" stroke-width="2"/>
    <text x="120" y="40" text-anchor="middle" class="title">PPO关键特性</text>
    <text x="30" y="60" class="small-label">• 策略梯度方法</text>
    <text x="30" y="80" class="small-label">• 裁剪防止过度更新</text>
    <text x="30" y="100" class="small-label">• Actor-Critic架构</text>
    <text x="30" y="120" class="small-label">• 在线学习算法</text>
  </g>

  <!-- 迭代箭头 -->
  <path d="M 300 300 Q 150 400 300 500" stroke="#ff6b6b" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="180" y="400" text-anchor="middle" class="label" fill="#ff6b6b">迭代训练</text>

</svg>