<!-- Search -->
<div class="search-page" role="dialog" aria-modal="false" aria-labelledby="search-panel-title" aria-hidden="true">
  <div class="search-main">
    <div class="search-panel-head">
      <div>
        <span class="search-panel-kicker">Quick find</span>
        <strong id="search-panel-title">站内搜索</strong>
      </div>
    <button type="button" class="search-icon-close" aria-label="关闭搜索">
        <i class="fa fa-times" aria-hidden="true"></i>
    </button>
  </div>
    <form role="search">
      <label class="sr-only" for="search-input">搜索标题或标签</label>
      <i class="fa fa-search" aria-hidden="true"></i>
      <input type="search" id="search-input" placeholder="搜索标题或标签…" autocomplete="off">
    </form>
    <div id="search-results" class="mini-post-list" aria-live="polite"></div>
  </div>
</div>
